{% extends "layout.html" %}
{% block title %}
  Search Dividend
{% endblock title %}
{% block main %}
  <form action="{{ url_for('stocks.dividends') }}" method="post">
    <select class="form-select" name="symbol">
      {% for symbol in symbols: %}<option value="{{ symbol }}">{{ symbol }}</option>{% endfor %}
    </select>
    <button type="input" class="btn btn-primary">Fetch Dividend</button>
  </form>
{% endblock main %}
