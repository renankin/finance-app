{% extends "layout.html" %}
{% block title %}
  Add new asset
{% endblock title %}
{% block main %}
  <form action="{{ url_for('assets.add') }}" method="post">
    <select name="account_id">
      {% for account in accounts %}
        <option value="{{ account['account_id'] }}">{{ account["account_name"] }}</option>
      {% endfor %}
    </select>
    <select name="market_source_id">
      {% for source in sources %}
        <option value="{{ source['source_id'] }}">{{ source["source_name"] }}</option>
      {% endfor %}
    </select>
    <input name="asset_name" type="text" placeholder="Asset name" />
    <select name="still_open">
      <option value="0">Position closed</option>
      <option value="1">Position open</option>
    </select>
    <button type="input" class="btn btn-primary">Add</button>
  </form>
{% endblock main %}
