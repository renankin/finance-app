{% extends "layout.html" %}
{% block title %}
  Edit
{% endblock title %}
{% block main %}
  <p>Editting {{ asset["asset_name"] }} in account {{ account["account_name"] }}:</p>
  <form action="{{ url_for('assets.edit_asset', account_id=account['account_id'], asset_id=asset['asset_id']) }}"
        method="post">
    <p>
      Account:
      <select name="account_id">
        {% for account in accounts %}
          <option value="{{ account['account_id'] }}">{{ account["account_name"] }}</option>
        {% endfor %}
      </select>
    </p>
    <p>
      Asset name:
      <input name="asset_name" type="text" value="{{ asset['asset_name'] }}" />
    </p>
    <p>
      Market source:
      <select name="market_source_id">
        {% for source in market_sources %}
          <option value="{{ source['source_id'] }}">{{ source["display_name"] }}</option>
        {% endfor %}
      </select>
    </p>
    <p>
      Position open:
      <input name="still_open"
             type="checkbox"
             {% if asset["still_open"] %}checked{% endif %} />
    </p>
    <p>
      <button type="submit" class="btn btn-primary">Edit</button>
    </p>
  </form>
{% endblock main %}
