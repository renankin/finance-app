{% extends "layout.html" %}
{% block title %}
  Market sources
{% endblock title %}
{% block main %}
  <table>
    <thead>
      <tr>
        <th>Source name</th>
      </tr>
    </thead>
    <tbody>
      {% for source in market_sources: %}
        <tr>
          <td>{{ source["source_name"] }}></td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock main %}
