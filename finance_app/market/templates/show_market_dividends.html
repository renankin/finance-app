{% extends "layout.html" %}
{% block title %}
  Dividends
{% endblock title %}
{% block main %}
  <table class="table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Dividend per share</th>
      </tr>
    </thead>
    <tbody>
      {% for div in dividends: %}
        <tr>
          <td>{{ div["date"] | format_date }}</td>
          <td>{{ div["dividend_value"] | format_currency(div["currency"]) }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock main %}
