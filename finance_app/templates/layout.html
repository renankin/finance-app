<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" />
    <meta name="keywords" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous" />
    <title>
      {% block title %}
      {% endblock title %}
    </title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-md">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="{{ url_for('transactions.index') }}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="{{ url_for('stocks.search') }}">Search</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="{{ url_for('stocks.add') }}">Add</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="{{ url_for('roi.roi') }}">ROI</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="{{ url_for('transactions.history') }}">History</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="{{ url_for('stocks.dividends') }}">Dividends</a>
          </li>
        </ul>
      </nav>
      {% if get_flashed_messages(): %}<p>{{ get_flashed_messages() | join(" ") }}</p>{% endif %}
    </header>
    <main>
      {% block main %}
      {% endblock main %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
  </body>
</html>
